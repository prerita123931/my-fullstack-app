<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Checker</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Animated Gradient */
            background: linear-gradient(-45deg, #ff6ec4, #7873f5, #42e695, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(0,0,0,0.4);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .input-box {
            position: relative;
            display: inline-block;
            margin-top: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .eye {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            font-size: 18px;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Password Strength Checker</h2>

        <div class="input-box">
            <input type="password" id="password" placeholder="Enter Password" onkeyup="checkPassword()">
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>

        <div id="result"></div>
    </div>

    <script>
        function checkPassword() {
            let pass = document.getElementById("password").value;
            let result = document.getElementById("result");

            let hasSpecial = /[!@#$%^&*(),.?":{}|<>]/.test(pass);
            let isRepeated = /^([a-zA-Z0-9])\1+$/.test(pass);

            if (pass.length < 6 || isRepeated) {
                result.innerHTML = "Very Weak";
                result.style.color = "red";
            } 
            else if (!hasSpecial) {
                result.innerHTML = "Weak";
                result.style.color = "orange";
            } 
            else {
                result.innerHTML = "Very Strong";
                result.style.color = "lightgreen";
            }
        }

        function togglePassword() {
            let passField = document.getElementById("password");

            if (passField.type === "password") {
                passField.type = "text";
            } else {
                passField.type = "password";
            }
        }
    </script>

</body>
</html>
